<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

    <div id="loginSection" class="flex items-center justify-center min-h-screen">
        <form id="loginForm" class="bg-white p-8 rounded shadow-md w-96">
            <h2 class="text-2xl font-bold mb-6 text-center">Admin Login</h2>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username"
                    class="mt-1 block w-full border p-2 rounded shadow-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password"
                    class="mt-1 block w-full border p-2 rounded shadow-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" id="btnLogin"
                class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 disabled:bg-gray-400">Accedi</button>
            <p id="loginError" class="text-red-500 text-sm mt-4 hidden text-center">Credenziali errate.</p>
        </form>
    </div>

    <div id="dashboardSection" class="hidden flex">
        <nav class="w-64 bg-gray-800 min-h-screen text-white p-6">
            <h2 class="text-xl font-bold mb-8 text-blue-400">Admin Panel</h2>
            <ul class="space-y-4">
                <li><button onclick="changeSection('posts')"
                        class="hover:text-blue-400 w-full text-left font-medium">Post</button></li>
                <li><button onclick="changeSection('users')"
                        class="hover:text-blue-400 w-full text-left font-medium">Utenti</button></li>
                <li><button onclick="changeSection('comments')"
                        class="hover:text-blue-400 w-full text-left font-medium">Commenti</button></li>
                <li><button onclick="changeSection('roles')"
                        class="hover:text-blue-400 w-full text-left font-medium">Ruoli</button></li>
                <li class="pt-8 border-t border-gray-700">
                    <button onclick="toggleBin()" id="btnBin"
                        class="text-yellow-500 hover:text-yellow-400 font-bold">Cestino</button>
                </li>
                <li class="pt-4">
                    <button onclick="logout()" class="text-red-400 hover:text-red-300">Logout</button>
                </li>
            </ul>
        </nav>

        <main class="flex-1 p-8">
            <div class="flex justify-between items-center mb-8">
                <h1 id="sectionTitle" class="text-3xl font-bold capitalize text-gray-800">Risorsa</h1>
                <button onclick="openCreateModal()" id="btnCreate"
                    class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Nuovo Elemento</button>
            </div>

            <div class="bg-white p-4 rounded shadow mb-6 flex gap-4 items-end">
                <div class="flex-1">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Cerca</label>
                    <input type="text" id="adminSearch" placeholder="Cerca..."
                        class="w-full border-b p-2 outline-none focus:border-blue-500">
                </div>
                <button onclick="fetchData()" id="btnSearch"
                    class="bg-blue-600 text-white px-6 py-2 rounded">Cerca</button>
            </div>

            <div id="tableContainer" class="bg-white rounded shadow overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50">
                        <tr id="tableHead"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
                <div id="tableState" class="p-10 text-center text-gray-500 hidden"></div>
            </div>

            <div id="paginationControls" class="flex items-center justify-center gap-4 mt-8">
                <button id="btnPrev" class="px-4 py-2 border rounded bg-white">Precedente</button>
                <span id="pageInfo" class="font-bold"></span>
                <button id="btnNext" class="px-4 py-2 border rounded bg-white">Successivo</button>
            </div>
        </main>
    </div>

    <div id="crudModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg max-w-lg w-full p-6 relative">
            <button onclick="closeModal()"
                class="absolute top-4 right-4 text-gray-500 hover:text-black text-2xl">&times;</button>

            <h2 id="modalTitle" class="text-2xl font-bold mb-6 capitalize text-gray-800">Nuovo Elemento</h2>

            <form id="crudForm" class="space-y-4">
                <div id="formFields" class="space-y-4 max-h-[60vh] overflow-y-auto p-1">
                </div>

                <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-gray-100">
                    <button type="button" onclick="closeModal()"
                        class="px-4 py-2 border rounded text-gray-600 hover:bg-gray-100">Annulla</button>
                    <button type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-bold shadow-sm">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin/admin.js"></script>
</body>

</html>
