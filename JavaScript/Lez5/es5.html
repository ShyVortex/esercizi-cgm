<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Selettore data">
    <title>Selettore data</title>
    <link rel="stylesheet" href="es5.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <header>
        <h1>Seleziona una data</h1><br>
    </header>
    <main>
        <h3>Inserisci una data e ti dirò se è un giorno festivo</h3><br>
        <form id="dataForm"> <label for="anno">Anno:</label>
            <input id="anno" name="anno" required>

            <label for="mese">Mese:</label>
            <input id="mese" name="mese" required min="1" max="12">

            <label for="giorno">Giorno:</label>
            <input id="giorno" name="giorno" required min="1" max="31">

            <button type="submit" id="btnInvia">Invia</button>
            <button type="reset" id="btnReset">Reset</button>
        </form>
        <p id="risultato"></p>
    </main>
    <script src="es5.js"></script>
</body>

</html>
